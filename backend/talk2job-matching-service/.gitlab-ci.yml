variables:
  # Docker Registry naming
  IMAGE_TAG: $CI_REGISTRY_IMAGE/job-service:$CI_COMMIT_SHORT_SHA
  LATEST_IMAGE: $CI_REGISTRY_IMAGE/job-service:latest
  # Python Path to find modules
  PYTHONPATH: "."

stages:
  - lint # Quality Gate
  - security # Security Gate
  - test # Validation
  - package # Containerization

# 1. Stage: Linting (Checking code style)
lint_code:
  stage: lint
  image: python:3.11-slim
  script:
    - pip install flake8
    - flake8 app/ --exclude=__pycache__,venv,alembic
  allow_failure: true

# 2. Stage: Security (Scanning for vulnerabilities)
security_scan:
  stage: security
  image: python:3.11-slim
  script:
    - pip install bandit
    - bandit -r app/ -x tests/
  allow_failure: true
# 3. Stage: Testing (Running CV Integration Tests)
test_service:
  stage: test
  image: python:3.11-slim
  before_script:
    - apt-get update && apt-get install -y libpq-dev build-essential
    - pip install -r requirements.txt
    - python -m spacy download en_core_web_sm
  script:
    - pytest app/modules/cv/tests/
  allow_failure: true

# 4. Stage: Package & Publish (Docker Build & Push)
publish_to_registry:
  stage: package
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  variables:
    # Inject Google DNS to prevent connection timeouts during pip/spacy inside Docker-in-Docker
    DOCKER_OPTS: "--dns=8.8.8.8 --dns=8.8.4.4"
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    # Using --network=host to bypass any strict runner proxy environments
    - docker build --network=host -t $IMAGE_TAG -t $LATEST_IMAGE .
    - docker push $IMAGE_TAG
    - docker push $LATEST_IMAGE
  rules:
    - if: $CI_COMMIT_BRANCH == "main"